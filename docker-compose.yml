version: '3.8'
services:
  mongodb:
    image: mongo:6.0
    container_name: prepiq-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: prepiq

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prepiq-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/prepiq
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prepiq-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
